name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Resolve public configuration
        id: config
        shell: bash
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY }}
          SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY }}
          AI_BACKEND_URL: ${{ vars.AI_BACKEND_URL }}
        run: |
          set -euo pipefail
          shopt -s nocasematch
          PREVIEW=false
          SUPABASE_CLIENT_KEY="${SUPABASE_PUBLISHABLE_KEY:-${SUPABASE_ANON_KEY:-}}"
          if [ -z "${SUPABASE_URL}" ] || [ -z "${SUPABASE_CLIENT_KEY}" ]; then
            PREVIEW=true
          elif [[ "${SUPABASE_URL}" =~ (your_|real_project|placeholder|example|dummy) ]] ||
               [[ "${SUPABASE_CLIENT_KEY}" =~ (your_|real_publishable|placeholder|example|dummy) ]]; then
            echo "Supabase repository variables contain placeholders."
            exit 1
          elif [[ "${SUPABASE_URL}" != https://*.supabase.co ]]; then
            echo "SUPABASE_URL must be the HTTPS project URL."
            exit 1
          fi
          if [ -n "${AI_BACKEND_URL}" ] && [[ "${AI_BACKEND_URL}" != https://* ]]; then
            echo "Production AI_BACKEND_URL must use HTTPS."
            exit 1
          fi
          if [ "${PREVIEW}" = true ]; then
            echo "Building local-only preview: authentication and protected AI are disabled."
          else
            echo "Building configured application."
          fi
          echo "preview=${PREVIEW}" >> "${GITHUB_OUTPUT}"

      - name: Build Flutter web release
        run: |
          flutter build web \
            --release \
            --base-href "/CHANSON-A-REPONDRE-UNO/" \
            --dart-define=SUPABASE_URL="${{ vars.SUPABASE_URL }}" \
            --dart-define=SUPABASE_ANON_KEY="${{ vars.SUPABASE_ANON_KEY }}" \
            --dart-define=SUPABASE_PUBLISHABLE_KEY="${{ vars.SUPABASE_PUBLISHABLE_KEY }}" \
            --dart-define=AI_BACKEND_URL="${{ vars.AI_BACKEND_URL }}" \
            --dart-define=SKIP_AUTH_FOR_DEVELOPMENT=false \
            --dart-define=APP_BUILD_SHA="${{ github.sha }}"

      - name: Add GitHub Pages fallback
        run: cp build/web/index.html build/web/404.html

      - name: Verify build output
        shell: bash
        run: |
          set -euo pipefail
          test -f build/web/index.html
          test -f build/web/404.html
          test -f build/web/flutter_bootstrap.js
          test -f build/web/main.dart.js
          grep -q '<base href="/CHANSON-A-REPONDRE-UNO/">' build/web/index.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
